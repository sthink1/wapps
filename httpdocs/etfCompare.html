<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ETF Compare</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .filters { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: center; }
    .tables-container { display: flex; gap: 30px; overflow-x: auto; }
    table { border-collapse: collapse; min-width: 600px; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    th { background: #f2f2f2; position: sticky; top: 0; z-index: 1; }
    .up   { color: green; font-weight: bold; }
    .down { color: red;   font-weight: bold; }
    .mock { color: red; font-weight: bold; background: #ffecec; }
    #investModal {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;
    }
    .modal-content {
      background: white; padding: 20px; border-radius: 8px; width: 90%; max-width: 700px; max-height: 80vh; overflow-y: auto;
    }
    .close { float: right; font-size: 24px; cursor: pointer; }
    button { padding: 8px 16px; cursor: pointer; }
    .sorted-column { background-color: #e0f7fa !important; font-weight: bold; }

    /* Added for Listed date styling */
    .name-cell {
      text-align: left;
      padding: 8px;
    }
    .listed-date {
      display: block;
      color: red;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.85em;
      padding-top: 6px;
    }
  </style>
</head>
<body>

<h2>ETF Compare</h2>

<div class="filters">
  <label>Category:
    <select id="category">
      <option value="">Choose a Category</option>
      <!-- Populated by JS -->
    </select>
  </label>

  <!-- Current Date and Past Date inputs removed (Change #3) -->

  <label>Rows:
    <select id="rows">
      <option value="5">5</option>
      <option value="10">10</option>
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="all" selected>All</option>
    </select>
  </label>

  <label>Sort By:
    <select id="sortBy">
      <option value="YTD">YTD</option>
      <option value="1W">1W</option>
      <option value="1M">1M</option>
      <option value="1Y" selected>1Y</option>
      <option value="3Y">3Y</option>
      <option value="5Y">5Y</option>
    </select>
  </label>

  <label>Order:
    <select id="order">
      <option value="desc">Descending</option>
      <option value="asc">Ascending</option>
    </select>
  </label>

  <button onclick="loadTables()">Load</button>
  <button id="investBtn" disabled onclick="openInvestModal()">Invest</button>
  <button onclick="history.back()">Back</button>
</div>

<div class="tables-container">
  <!-- Table 1: Current -->
  <div>
    <h3>Table 1 - Current <span id="currentDateDisplay"></span></h3>
    <table id="currentTable">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Name</th>
          <th>Invest</th>
          <th>Movement</th>
          <!-- AUM and Volume removed (Change #1) -->
          <th>Price</th>
          <th class="perf">YTD %</th>
          <th class="perf">1W %</th>
          <th class="perf">1M %</th>
          <th class="perf">1Y %</th>
          <th class="perf">3Y %</th>
          <th class="perf">5Y %</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <!-- Table 2: Past -->
  <div>
    <h3>Table 2 - Past <span id="pastDateDisplay"></span></h3>
    <table id="pastTable">
      <thead>
        <tr>
          <th>Symbol</th>
          <th>Price</th>
          <th class="perf">YTD %</th>
          <th class="perf">1W %</th>
          <th class="perf">1M %</th>
          <th class="perf">1Y %</th>
          <th class="perf">3Y %</th>
          <th class="perf">5Y %</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- Invest Modal (unchanged) -->
<div id="investModal">
  <div class="modal-content">
    <span class="close" onclick="closeInvestModal()">×</span>
    <h3>Invest</h3>
    <label>How much to invest: $
      <input type="number" id="investAmount" placeholder="5000" min="1">
    </label>
    <button onclick="calculateAllocation()">Calculate</button>
    <button onclick="printModal()">Print</button>
    <button onclick="closeInvestModal()">Cancel</button>

    <table id="allocTable">
      <thead>
        <tr><th>Symbol</th><th>Name</th><th>Price</th><th>Shares</th><th>Cost</th></tr>
      </thead>
      <tbody></tbody>
    </table>
    <p><strong>Total:</strong> $<span id="totalCost">0.00</span></p>
    <p><strong>Remainder:</strong> $<span id="remainder">0.00</span></p>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// JWT token (unchanged)
const token = localStorage.getItem('token') || '';

// ─────────────────────────────────────────────
// Trading day helpers (copied from etfAPItest.html for Change #3)
const HOLIDAYS_2020_2036 = [
  [2020,1,1],[2020,1,20],[2020,2,17],[2020,4,10],[2020,5,25],[2020,7,3],[2020,9,7],[2020,11,26],[2020,12,25],
  [2021,1,1],[2021,1,18],[2021,2,15],[2021,4,2],[2021,5,31],[2021,6,18],[2021,7,5],[2021,9,6],[2021,11,25],[2021,12,24],
  [2022,1,17],[2022,2,21],[2022,4,15],[2022,5,30],[2022,6,20],[2022,7,4],[2022,9,5],[2022,11,24],[2022,12,26],
  [2023,1,2],[2023,1,16],[2023,2,20],[2023,4,7],[2023,5,29],[2023,6,19],[2023,7,4],[2023,9,4],[2023,11,23],[2023,12,25],
  [2024,1,1],[2024,1,15],[2024,2,19],[2024,3,29],[2024,5,27],[2024,6,19],[2024,7,4],[2024,9,2],[2024,11,28],[2024,12,25],
  [2025,1,1],[2025,1,20],[2025,2,17],[2025,4,18],[2025,5,26],[2025,6,19],[2025,7,4],[2025,9,1],[2025,11,27],[2025,12,25],
  [2026,1,1],[2026,1,19],[2026,2,16],[2026,4,3],[2026,5,25],[2026,6,19],[2026,7,3],[2026,9,7],[2026,11,26],[2026,12,25],
  [2027,1,1],[2027,1,18],[2027,2,15],[2027,3,26],[2027,5,31],[2027,6,18],[2027,7,5],[2027,9,6],[2027,11,25],[2027,12,24],
  [2028,1,17],[2028,2,21],[2028,4,14],[2028,5,29],[2028,6,19],[2028,7,4],[2028,9,4],[2028,11,23],[2028,12,25],
  [2029,1,1],[2029,1,15],[2029,2,19],[2029,3,30],[2029,5,28],[2029,6,19],[2029,7,4],[2029,9,3],[2029,11,22],[2029,12,25],
  [2030,1,1],[2030,1,21],[2030,2,18],[2030,4,19],[2030,5,27],[2030,6,19],[2030,7,4],[2030,9,2],[2030,11,28],[2030,12,25],
  [2031,1,1],[2031,1,20],[2031,2,17],[2031,4,11],[2031,5,26],[2031,6,19],[2031,7,4],[2031,9,1],[2031,11,27],[2031,12,25],
  [2032,1,1],[2032,1,19],[2032,2,16],[2032,3,26],[2032,5,31],[2032,6,18],[2032,7,5],[2032,9,6],[2032,11,25],[2032,12,24],
  [2033,1,17],[2033,2,21],[2033,4,15],[2033,5,30],[2033,6,20],[2033,7,4],[2033,9,5],[2033,11,24],[2033,12,26],
  [2034,1,2],[2034,1,16],[2034,2,20],[2034,4,7],[2034,5,29],[2034,6,19],[2034,7,4],[2034,9,4],[2034,11,23],[2034,12,25],
  [2035,1,1],[2035,1,15],[2035,2,19],[2035,3,23],[2035,5,28],[2035,6,19],[2035,7,4],[2035,9,3],[2035,11,22],[2035,12,25],
  [2036,1,1],[2036,1,21],[2036,2,18],[2036,4,11],[2036,5,26],[2036,6,19],[2036,7,4],[2036,9,1],[2036,11,27],[2036,12,25]
];

const HOLIDAY_SET = new Set(
  HOLIDAYS_2020_2036.map(([y,m,d]) => Date.UTC(y, m-1, d))
);

function toDateStr(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dy}`;
}

function parseDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function isHoliday(d) {
  return HOLIDAY_SET.has(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
}

function isWeekend(d) {
  const day = d.getDay();
  return day === 0 || day === 6;
}

function isMarketClosed(d) {
  return isWeekend(d) || isHoliday(d);
}

function getMostRecentOpenDay(dateStr) {
  let d = parseDate(dateStr);
  while (isMarketClosed(d)) {
    d.setDate(d.getDate() - 1);
  }
  return toDateStr(d);
}

// ─────────────────────────────────────────────
// Fetch helper (unchanged)
async function fetchWithAuth(url) {
  const res = await fetch(url, {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  if (!res.ok) throw new Error('API error: ' + res.status);
  return res.json();
}

// ─────────────────────────────────────────────
// Populate categories (unchanged)
async function populateCategories() {
  try {
    const data = await fetchWithAuth('/etf/category');
    const select = document.getElementById('category');
    data.data.forEach(cat => {
      const opt = document.createElement('option');
      opt.value = cat.category;
      opt.textContent = cat.category;
      select.appendChild(opt);
    });
    const allOpt = document.createElement('option');
    allOpt.value = 'ALL';
    allOpt.textContent = 'ALL';
    select.appendChild(allOpt);
  } catch (err) {
    console.error('Failed to load categories:', err);
    alert('Could not load categories. Check login or server.');
  }
}

// ─────────────────────────────────────────────
// On page load — compute trading dates instead of using inputs
window.onload = () => {
  populateCategories();

  // Compute current and past trading dates (Change #3)
  const today = new Date();
  const currentDateStr = getMostRecentOpenDay(toDateStr(today));

  const oneYearAgo = new Date(today);
  oneYearAgo.setFullYear(today.getFullYear() - 1);
  const pastDateStr = getMostRecentOpenDay(toDateStr(oneYearAgo));

  // Set display spans immediately
  document.getElementById('currentDateDisplay').textContent = currentDateStr;
  document.getElementById('pastDateDisplay').textContent = pastDateStr;

  // Optional: auto-load on page open (uncomment if desired)
  // loadTables();
};

// ─────────────────────────────────────────────
// Number formatting (unchanged)
function formatNumber(num) {
  if (num === 'N/A' || num == null || isNaN(num)) return 'N/A';
  return Number(num).toLocaleString('en-US', {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2
  });
}

// ─────────────────────────────────────────────
// Per-Category Cache with 60-minute TTL
// Cache structure: { 'categoryName': { timestamp: ms, data: { current: [...], past: [...] } } }
const CACHE_TTL_MS = 60 * 60 * 1000; // 60 minutes
let categoryCache = {};

function getCachedData(category) {
  const cached = categoryCache[category];
  if (!cached) return null;
  
  const now = Date.now();
  if (now - cached.timestamp > CACHE_TTL_MS) {
    // Cache expired, delete it
    delete categoryCache[category];
    return null;
  }
  
  return cached.data;
}

function setCachedData(category, current, past) {
  categoryCache[category] = {
    timestamp: Date.now(),
    data: { current, past }
  };
}

function clearCache() {
  categoryCache = {};
}

// ─────────────────────────────────────────────
// Load tables — use computed trading dates (Change #3)
async function loadTables() {
  const cat    = document.getElementById('category').value;
  if (!cat) return alert('Please select a category');

  // Check if valid cache exists for this category
  const cachedData = getCachedData(cat);
  if (cachedData) {
    console.log(`Using cached data for category: ${cat}`);
    renderTable('currentTable', cachedData.current, true);
    renderTable('pastTable', cachedData.past, false);

    document.querySelectorAll('th.perf').forEach(th => {
      th.classList.toggle('sorted-column', th.textContent.trim() === document.getElementById('sortBy').value);
    });

    document.getElementById('investBtn').disabled = false;
    return;
  }

  // Use the already computed trading dates from onload
  const currDate = document.getElementById('currentDateDisplay').textContent;
  const pastDate = document.getElementById('pastDateDisplay').textContent;

  const rowsVal  = document.getElementById('rows').value;
  const sort     = document.getElementById('sortBy').value;
  const ord      = document.getElementById('order').value;

  const params = new URLSearchParams({
    category: cat,
    currentDate: currDate,
    pastDate: pastDate,
    rows: rowsVal === 'ToDisplay' ? '5' : rowsVal,
    sortBy: sort,
    order: ord,
    mock: 'false'
  });

  try {
    const { current, past } = await fetchWithAuth(`/etf/compare?${params}`);

    // Store in per-category cache with TTL
    setCachedData(cat, current, past);

    renderTable('currentTable', current, true);
    renderTable('pastTable', past, false);

    document.querySelectorAll('th.perf').forEach(th => {
      th.classList.toggle('sorted-column', th.textContent.trim() === sort);
    });

    document.getElementById('investBtn').disabled = false;
  } catch (err) {
    console.error(err);
    alert('Failed to load data: ' + err.message);
  }
}

// ─────────────────────────────────────────────
// Render table — Name cell modified (Change #2), AUM/Volume removed (Change #1)
function renderTable(tableId, data, isCurrent) {
  const tbody = document.querySelector(`#${tableId} tbody`);
  tbody.innerHTML = '';

  data.forEach(item => {
    const row = tbody.insertRow();

    if (isCurrent) {
      row.insertCell().textContent = item.symbol;

      // Modified Name cell (Change #2)
      const nameCell = row.insertCell();
      nameCell.className = 'name-cell';
      nameCell.innerHTML = `
        ${item.name || '—'}
        ${item.listDate ? `<span class="listed-date">LISTED: ${formatListedDate(item.listDate)}</span>` : ''}
      `;

      const chkCell = row.insertCell();
      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.dataset.symbol = item.symbol;
      chk.dataset.name   = item.name;
      chk.dataset.price  = item.price !== 'N/A' ? item.price : 0;
      chkCell.appendChild(chk);

      const movCell = row.insertCell();
      movCell.textContent = item.movement || '–';
      if (item.movement?.startsWith('↑')) movCell.className = 'up';
      if (item.movement?.startsWith('↓')) movCell.className = 'down';

      // AUM and Volume removed (Change #1)
      addCell(row, item.price, item.isMock);

      ['YTD','1W','1M','1Y','3Y','5Y'].forEach(p => {
        const val = item.returns[p];
        const display = (val !== 'N/A' && val !== null) ? val + '%' : 'N/A';
        addCell(row, display, item.isMock);
      });
    } else {
      row.insertCell().textContent = item.symbol;
      addCell(row, item.price, item.isMock);
      ['YTD','1W','1M','1Y','3Y','5Y'].forEach(p => {
        const val = item.returns[p];
        const display = (val !== 'N/A' && val !== null) ? val + '%' : 'N/A';
        addCell(row, display, item.isMock);
      });
    }
  });
}

// Helper for Listed date format MM/DD/YYYY
function formatListedDate(dateStr) {
  if (!dateStr) return 'N/A';
  const d = new Date(dateStr);
  if (isNaN(d.getTime())) return 'N/A';
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const y = d.getFullYear();
  return `${m}/${day}/${y}`;
}

function addCell(row, value, isMock = false) {
  const cell = row.insertCell();
  cell.textContent = value;
  if (isMock) cell.classList.add('mock');
}

// ─────────────────────────────────────────────
// Invest modal and related functions (unchanged)
function openInvestModal() {
  const modal = document.getElementById('investModal');
  const tbody = document.querySelector('#allocTable tbody');
  tbody.innerHTML = '';

  const checked = Array.from(document.querySelectorAll('#currentTable input[type="checkbox"]:checked'));

  if (checked.length === 0) {
    alert('Select at least one ETF to invest in.');
    return;
  }

  modal.style.display = 'flex';

  window.selectedInvest = checked.map(chk => ({
    symbol: chk.dataset.symbol,
    name:   chk.dataset.name,
    price:  parseFloat(chk.dataset.price) || 0
  }));

  window.selectedInvest.sort((a,b) => a.name.localeCompare(b.name));
}

function closeInvestModal() {
  document.getElementById('investModal').style.display = 'none';
}

function calculateAllocation() {
  const amount = parseFloat(document.getElementById('investAmount').value) || 5000;
  if (amount <= 0) return alert('Enter a positive amount');

  let remaining = amount;
  const shares = new Array(window.selectedInvest.length).fill(0);

  while (remaining > 0) {
    let added = false;
    const minPrice = Math.min(...window.selectedInvest.map(s => s.price).filter(p => p > 0));
    if (remaining < minPrice) break;

    for (let i = 0; i < window.selectedInvest.length; i++) {
      const p = window.selectedInvest[i].price;
      if (p > 0 && remaining >= p) {
        shares[i]++;
        remaining -= p;
        added = true;
      }
    }
    if (!added) break;
  }

  const tbody = document.querySelector('#allocTable tbody');
  tbody.innerHTML = '';
  let totalCost = 0;

  window.selectedInvest.forEach((s, i) => {
    const cost = shares[i] * s.price;
    totalCost += cost;
    const row = tbody.insertRow();
    row.insertCell().textContent = s.symbol;
    row.insertCell().textContent = s.name;
    row.insertCell().textContent = formatNumber(s.price);
    row.insertCell().textContent = shares[i];
    row.insertCell().textContent = formatNumber(cost);
  });

  document.getElementById('totalCost').textContent = formatNumber(totalCost);
  document.getElementById('remainder').textContent = formatNumber(amount - totalCost);
}

function printModal() {
  const modalContent = document.querySelector('.modal-content').cloneNode(true);
  modalContent.querySelectorAll('button, .close').forEach(el => el.remove());

  const printWindow = window.open('', '', 'height=700,width=900');
  printWindow.document.write('<html><head><title>Investment Allocation</title>');
  printWindow.document.write('<style>body{font-family:Arial,sans-serif;margin:20px;} table{border-collapse:collapse;width:100%;} th,td{border:1px solid #000;padding:8px;text-align:left;} th{background:#f2f2f2;}</style>');
  printWindow.document.write('</head><body>');
  printWindow.document.write('<h2>Investment Allocation - ' + new Date().toLocaleDateString() + '</h2>');
  printWindow.document.write(modalContent.innerHTML);
  printWindow.document.write('</body></html>');
  printWindow.document.close();
  printWindow.focus();
  printWindow.print();
}

// ────────────────────────────────────────────────
// Instant client-side sorting & rows limit (no re-fetch needed)

let lastFullCurrent = [];  // full unsorted data from last Load
let lastFullPast    = [];

// Override renderTable to capture full data
const originalRenderTable = renderTable;
renderTable = function(tableId, data, isCurrent) {
  if (isCurrent) lastFullCurrent = [...data];  // shallow copy
  else           lastFullPast    = [...data];
  originalRenderTable(tableId, data, isCurrent);
};

// Re-sort and re-apply rows limit
function refreshTablesFromCache() {
  const sortByVal = document.getElementById('sortBy').value;
  const orderVal  = document.getElementById('order').value;
  const rowsVal   = document.getElementById('rows').value;

  const numRows = rowsVal === 'all' ? Infinity : parseInt(rowsVal);

  // Sort function
  const sortFunc = (a, b) => {
    let va = parseFloat(a.returns[sortByVal]) || -Infinity;
    let vb = parseFloat(b.returns[sortByVal]) || -Infinity;
    return orderVal === 'desc' ? vb - va : va - vb;
  };

  // Apply sort + rows limit
  const sortedCurrent = [...lastFullCurrent].sort(sortFunc).slice(0, numRows);
  const sortedPast    = [...lastFullPast]   .sort(sortFunc).slice(0, numRows);

  // Re-render
  renderTable('currentTable', sortedCurrent, true);
  renderTable('pastTable',    sortedPast,    false);
}

// Attach listeners (runs on dropdown change)
document.getElementById('sortBy').addEventListener('change', refreshTablesFromCache);
document.getElementById('order').addEventListener('change',  refreshTablesFromCache);
document.getElementById('rows').addEventListener('change',   refreshTablesFromCache);

// ────────────────────────────────────────────────
// Page-leave cleanup: Clear cache when user leaves
window.addEventListener('beforeunload', clearCache);
window.addEventListener('pagehide', clearCache);


</script>
</body>
</html>
